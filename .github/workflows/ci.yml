name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check formatting
        run: black --check .

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: python -m pytest test_deck_generator.py -v
